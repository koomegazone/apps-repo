apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/koomegazone/apps-repo
        revision: main
        directories:
          - path: tenants/*/*
  template:
    metadata:
      name: "{{path[2]}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/koomegazone/apps-repo
        path: "{{path}}"
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path[2]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
